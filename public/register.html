<!DOCTYPE html>
<html data-theme="retro-teal">

<head>
  <meta charset="UTF-8">
  <title>Registration</title>
  <link rel="stylesheet" href="../dist/styles.css">
</head>

<body class="bg-bg text-fg min-h-screen flex flex-col items-center justify-center px-6">
  <h2 class="text-2xl font-bold mb-2 text-fg">Welcome!</h2>

  <p class="mb-6 text-muted text-sm">
    Register your profile picture and pseudo
  </p>

  <form id="registerForm" class="flex flex-col gap-4">

    <input type="text" id="pseudo" placeholder="Pseudo" required class="bg-bg/40 border border-border/20 rounded-lg px-4 py-2 
               focus:outline-none focus:ring-2 focus:ring-accent/60 
               text-fg placeholder:text-muted" />

    <input type="file" id="avatar" accept="image/*" required class="text-sm text-muted" />

    <button type="submit" class="bg-accent text-accentFg font-semibold py-2 rounded-lg 
               hover:opacity-90 transition-all duration-200 shadow-md">
      Save
    </button>

  </form>

  <div id="error" class="text-red-500 mt-4 text-sm"></div>

  <!-- </div> -->

  <script type="module" src="../dist/src/renderer/register.js"></script>
</body>

</html>
