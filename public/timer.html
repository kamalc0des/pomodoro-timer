<!DOCTYPE html>
<html data-theme="retro-teal" lang="en">

<head>
  <meta charset="UTF-8">
  <title>Timer Pomodoro</title>
  <script>(function(){try{var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="../dist/styles.css">
</head>

<body class="bg-bg text-fg min-h-screen flex flex-col p-4">

  <div class="fixed top-0 left-0 right-0 flex justify-between items-center p-4 bg-bg z-10">
    <div class="flex flex-row items-center gap-3">
      <img id="profilePic" class="w-12 h-12 rounded-full border border-border/30" />
      <div>
        <h2 id="userInfo" class="text-sm font-semibold text-fg"></h2>
        <span id="rankLabel" class="text-xs text-muted"></span>
        <div id="xpBar" class="mt-1 w-32 py-1 cursor-default" data-tooltip="">
          <div class="w-32 h-1 bg-surface/40 rounded-full overflow-hidden">
            <div id="xpFill" class="h-full transition-all duration-500 rounded-full" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="flex gap-2 items-center">
      <button id="langToggle"
        class="hidden text-xs bg-surface/40 border border-border/20 px-2 py-1 rounded-md hover:bg-surface/60 transition">
        EN / FR
      </button>
      <button id="profileBtn"
        class="bg-bg/40 border border-border/20 font-semibold py-2.5 px-3 rounded-lg shadow-md hover:bg-bg/60 transition flex items-center justify-center">
        <i data-lucide="user-round" class="w-5 h-5"></i>
      </button>
      <button id="settingsBtn"
        class="bg-bg/40 border border-border/20 font-semibold py-2.5 px-3 rounded-lg shadow-md hover:bg-bg/60 transition flex items-center justify-center">
        <i data-lucide="settings" class="w-5 h-5"></i>
      </button>
    </div>
  </div>

  <div class="flex flex-col items-center justify-center flex-1 pt-20">
    <div id="modeSwitch" class="inline-flex bg-surface/30 border border-border/20 rounded-full p-1 mb-5 text-xs">
      <button type="button" data-mode="pomodoro" data-i18n="timer.mode.pomodoro"
        class="mode-btn px-4 py-1 rounded-full font-semibold transition"></button>
      <button type="button" data-mode="timer" data-i18n="timer.mode.timer"
        class="mode-btn px-4 py-1 rounded-full font-semibold transition"></button>
    </div>
    <div class="flex flex-col items-center justify-center mb-6">
      <div id="timer" class="text-6xl font-mono tracking-tight text-fg">25:00</div>
    </div>

    <div class="flex flex-wrap gap-3 justify-center mb-3">
      <button id="startPauseBtn" data-i18n="timer.start"
        class="bg-accent text-accentFg font-semibold py-2.5 px-6 rounded-lg shadow-md hover:opacity-90 transition">
      </button>
      <button id="resetBtn" data-i18n="timer.reset"
        class="bg-surface/40 border border-border/20 text-fg font-semibold py-2.5 px-6 rounded-lg shadow-md hover:bg-surface/55 transition">
      </button>
    </div>

    <div id="cycleInfo" class="text-xs text-muted text-center"></div>
  </div>

  <footer class="mt-auto flex justify-center pb-3">
    <a id="supportLink" class="text-xs text-muted hover:text-accent transition-colors duration-200 cursor-pointer"
      href="https://kamalcodes.dev" data-i18n="footer.support">
      Support me and visit my portfolio: @kamalcodes</a>
  </footer>

  <div id="levelUpOverlay"
    class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-bg/95 backdrop-blur-sm">
    <div id="levelUpTitle" class="text-3xl font-extrabold font-hero text-accent tracking-widest level-up-title"></div>
    <div id="levelUpRank" class="text-5xl font-bold font-hero mt-4 level-up-rank"></div>
  </div>

  <div id="achievementToast"
    class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-surface border border-accent/40 text-fg px-4 py-2 rounded-lg shadow-xl text-sm z-40">
  </div>

  <script src="vendor/lucide.min.js"></script>
  <script src="vendor/motion.min.js"></script>
  <script type="module" src="../dist/src/renderer/timer.js"></script>
</body>

</html>
