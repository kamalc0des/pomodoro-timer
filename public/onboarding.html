<!DOCTYPE html>
<html data-theme="retro-teal" lang="en">

<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
  <link rel="stylesheet" href="../dist/styles.css">
</head>

<body class="bg-bg text-fg min-h-screen flex flex-col px-6 py-6">

  <button id="langToggle"
    class="fixed top-3 right-3 text-xs bg-surface/40 border border-border/20 px-2 py-1 rounded-md hover:bg-surface/60 transition z-50">
    EN / FR
  </button>

  <div id="stepper" class="flex justify-center gap-2 mb-6"></div>

  <main class="flex-1 flex flex-col items-center justify-center w-full max-w-sm mx-auto">

    <section data-step="0" class="step w-full text-center hidden">
      <div class="text-7xl mb-4">🍅</div>
      <h1 class="text-2xl font-bold mb-2" data-i18n="onboarding.welcome.title">Welcome to Minutor</h1>
      <p class="text-sm text-muted mb-8" data-i18n="onboarding.welcome.body"></p>
    </section>

    <section data-step="1" class="step w-full hidden">
      <h2 class="text-xl font-bold mb-1 text-center" data-i18n="onboarding.identity.title"></h2>
      <p class="text-sm text-muted mb-6 text-center" data-i18n="onboarding.identity.subtitle"></p>
      <div class="flex flex-col items-center gap-3">
        <img id="avatarPreview" class="w-24 h-24 rounded-full border-2 border-accent shadow-lg bg-surface/30" />
        <input type="file" id="avatarInput" accept="image/*"
          class="text-sm text-muted file:bg-surface/40 file:border-0 file:rounded-md file:text-fg file:px-3 file:py-1 file:mr-3" />
        <input type="text" id="pseudoInput" data-i18n-placeholder="onboarding.identity.pseudo"
          class="bg-bg/40 border border-border/20 rounded-lg px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-accent/60 text-fg placeholder:text-muted" />
        <div id="identityError" class="text-xs text-red-400 h-4"></div>
      </div>
    </section>

    <section data-step="2" class="step w-full hidden">
      <h2 class="text-xl font-bold mb-1 text-center" data-i18n="onboarding.rhythm.title"></h2>
      <p class="text-sm text-muted mb-6 text-center" data-i18n="onboarding.rhythm.subtitle"></p>
      <div class="flex flex-col gap-4 rhythm-picker"></div>
    </section>

    <section data-step="3" class="step w-full hidden text-center">
      <div class="text-5xl mb-3">🔔</div>
      <h2 class="text-xl font-bold mb-1" data-i18n="onboarding.notif.title"></h2>
      <p class="text-sm text-muted mb-6" data-i18n="onboarding.notif.body"></p>
      <div class="flex flex-col gap-3">
        <label class="flex items-center justify-center gap-3 cursor-pointer">
          <input type="checkbox" id="notifToggle" class="w-4 h-4 accent-accent" checked />
          <span class="text-sm" data-i18n="onboarding.notif.toggle"></span>
        </label>
        <button type="button" id="testNotifBtn" data-i18n="onboarding.notif.test"
          class="bg-surface/40 border border-border/20 text-fg font-semibold py-2 px-4 rounded-lg hover:bg-surface/55 transition text-sm">
        </button>
      </div>
    </section>

    <section data-step="4" class="step w-full hidden">
      <h2 class="text-xl font-bold mb-1 text-center" data-i18n="onboarding.theme.title"></h2>
      <p class="text-sm text-muted mb-6 text-center" data-i18n="onboarding.theme.subtitle"></p>
      <div class="grid grid-cols-2 gap-2 w-full">
        <button type="button" data-theme="retro-teal"
          class="theme-btn flex items-center gap-2 px-3 py-2 rounded-lg border border-border/20 bg-surface/20 hover:bg-surface/40 transition text-sm font-medium">
          <span class="w-4 h-4 rounded-full" style="background: linear-gradient(135deg, #2dd4bf, #0f766e)"></span>
          Retro Teal
        </button>
        <button type="button" data-theme="coral-teal"
          class="theme-btn flex items-center gap-2 px-3 py-2 rounded-lg border border-border/20 bg-surface/20 hover:bg-surface/40 transition text-sm font-medium">
          <span class="w-4 h-4 rounded-full" style="background: linear-gradient(135deg, #fb7185, #2dd4bf)"></span>
          Coral Teal
        </button>
        <button type="button" data-theme="burgundy-gold"
          class="theme-btn flex items-center gap-2 px-3 py-2 rounded-lg border border-border/20 bg-surface/20 hover:bg-surface/40 transition text-sm font-medium">
          <span class="w-4 h-4 rounded-full" style="background: linear-gradient(135deg, #9f1239, #ca8a04)"></span>
          Burgundy Gold
        </button>
        <button type="button" data-theme="slate-orange"
          class="theme-btn flex items-center gap-2 px-3 py-2 rounded-lg border border-border/20 bg-surface/20 hover:bg-surface/40 transition text-sm font-medium">
          <span class="w-4 h-4 rounded-full" style="background: linear-gradient(135deg, #475569, #ea580c)"></span>
          Slate Orange
        </button>
      </div>
    </section>

    <section data-step="5" class="step w-full hidden">
      <h2 class="text-xl font-bold mb-1 text-center" data-i18n="onboarding.rpg.title"></h2>
      <p class="text-sm text-muted mb-6 text-center" data-i18n="onboarding.rpg.body"></p>
      <div id="rankList" class="flex flex-col gap-1 text-sm"></div>
    </section>

    <section data-step="6" class="step w-full hidden text-center">
      <div class="text-7xl mb-4">🥷</div>
      <h2 class="text-2xl font-bold mb-2" id="readyTitle"></h2>
      <p class="text-sm text-muted mb-6" data-i18n="onboarding.ready.body"></p>
    </section>

  </main>

  <div class="flex gap-2 max-w-sm mx-auto w-full mt-6">
    <button id="prevBtn" data-i18n="common.prev"
      class="flex-1 bg-surface/40 border border-border/20 text-fg font-semibold py-2.5 px-4 rounded-lg hover:bg-surface/55 transition">
    </button>
    <button id="nextBtn"
      class="flex-1 bg-accent text-accentFg font-semibold py-2.5 px-4 rounded-lg shadow-md hover:opacity-90 transition">
    </button>
  </div>

  <script type="module" src="../dist/src/renderer/onboarding.js"></script>
</body>

</html>
