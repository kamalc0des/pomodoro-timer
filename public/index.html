<!DOCTYPE html>
<html data-theme="retro-teal" lang="en">

<head>
  <meta charset="UTF-8">
  <title>Pomodoro</title>
  <link rel="stylesheet" href="../dist/styles.css">
</head>

<body class="bg-bg text-fg min-h-screen flex flex-col items-center justify-center px-6">

  <button id="langToggle"
    class="fixed top-3 right-3 text-xs bg-surface/40 border border-border/20 px-2 py-1 rounded-md hover:bg-surface/60 transition">
    EN / FR
  </button>

  <div id="welcome" class="flex flex-col items-center mb-8 text-center"></div>

  <button id="startBtn"
    class="w-full max-w-xs bg-accent text-accentFg font-semibold py-3 px-6 rounded-xl shadow-md hover:opacity-90 transition text-base mb-3"
    data-i18n="index.start">
    Let's go 😎
  </button>

  <button id="resetAppBtn"
    class="text-xs text-muted hover:text-red-400 transition-colors duration-200 underline underline-offset-2 cursor-pointer"
    data-i18n="index.delete">
    Delete my profile
  </button>

  <script type="module" src="../dist/src/renderer/index.js"></script>
</body>

</html>
